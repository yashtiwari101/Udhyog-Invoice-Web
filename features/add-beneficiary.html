<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Customer - Udhyog Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans', Arial, sans-serif;
      background: #eef2ff;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOP */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      height: 58px;
      background: #1a237e;
      border-bottom: 3px solid #ffeb3b;
    }

    .topbar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .topbar .logo-icon {
      width: 32px;
      height: 32px;
      background: #ffeb3b;
      color: #1a237e;
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar .logo-text {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 17px;
      color: #fff;
    }

    .topbar .logo-text .accent {
      color: #ffeb3b;
    }

    .topbar h1 {
      font-family: 'Baloo 2', cursive;
      font-size: 16px;
      font-weight: 700;
      color: #c5cae9;
    }

    .form-area {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      flex: 1;
    }

    .section-title {
      font-family: 'Baloo 2', cursive;
      font-size: 16px;
      font-weight: 700;
      color: #1a237e;
      border-left: 4px solid #ffeb3b;
      padding-left: 10px;
      margin: 20px 0 14px;
    }

    .card {
      background: #fff;
      border: 1.5px solid #c5cae9;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    /* MSG */
    .msg-box {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 20px;
      display: none;
    }

    .msg-box.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    .msg-box.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    /* FIELD */
    .field-group {
      margin-bottom: 24px;
    }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    .field-group input,
    .field-group textarea {
      width: 100%;
      background: #fafbff;
      border: 1.5px solid #c5cae9;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: #222;
      font-family: 'Noto Sans', sans-serif;
      outline: none;
      transition: border .2s;
    }

    .field-group input::placeholder,
    .field-group textarea::placeholder {
      color: #999;
    }

    .field-group input:focus,
    .field-group textarea:focus {
      border-color: #1a237e;
      background: #fff;
    }

    /* FORM ROW GRID */
    .form-row {
      display: grid;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-row.c4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .form-row.c3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .form-row.c2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .form-row.c1 {
      grid-template-columns: 1fr;
    }

    @media (max-width: 768px) {

      .form-row.c4,
      .form-row.c3,
      .form-row.c2 {
        grid-template-columns: 1fr;
      }
    }

    .field-group textarea {
      resize: none;
      min-height: 80px;
    }

    /* SAVE BUTTON */
    .btn-save {
      width: 100%;
      background: #1a237e;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
      margin-top: 10px;
    }

    .btn-save:hover {
      background: #283593;
    }

    .btn-save:active {
      transform: scale(0.98);
    }

    /* SAVED CUSTOMERS LIST */
    .cust-list {
      margin-top: 36px;
    }

    .cust-list h3 {
      font-size: 14px;
      color: #555;
      margin-bottom: 14px;
      border-bottom: 1px solid #1c1c1c;
      padding-bottom: 8px;
    }

    .cust-card {
      background: #fff;
      border: 1.5px solid #c5cae9;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cust-card .c-name {
      font-size: 16px;
      font-weight: bold;
      color: #1a237e;
      margin-bottom: 3px;
    }

    .cust-card .c-phone {
      font-size: 13px;
      color: #1a237e;
      margin-bottom: 2px;
    }

    .cust-card .c-addr {
      font-size: 12px;
      color: #777;
    }

    .cust-card .c-gst {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .del-btn {
      background: none;
      border: none;
      color: #f44336;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0 4px;
    }

    .del-btn:hover {
      color: #ff1744;
    }

    .empty-note {
      text-align: center;
      color: #999;
      font-size: 13px;
      padding: 18px 0;
    }

    /* HOME INDICATOR */
    .home-indicator {
      text-align: center;
      padding: 18px 0 12px;
    }

    .home-indicator span {
      display: inline-block;
      width: 110px;
      height: 5px;
      background: #1c1c1c;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="features.html" class="logo">
      <div class="logo-icon">U</div>
      <span class="logo-text">Udhyog <span class="accent">Invoice</span></span>
    </a>
    <h1>Add Customer</h1>
  </div>

  <div class="form-area">

    <div id="msg-box" class="msg-box"></div>

    <div class="section-title">Customer Details</div>
    <div class="card">
      <div class="form-row c3">
        <div class="field-group" style="margin-bottom: 0;">
          <label>Full Name</label>
          <input type="text" id="cust-name" placeholder="e.g. Rahul Sharma" />
        </div>
        <div class="field-group" style="margin-bottom: 0;">
          <label>Phone Number</label>
          <input type="tel" id="cust-phone" placeholder="+91 00000 00000" />
        </div>
        <div class="field-group" style="margin-bottom: 0;">
          <label>GST Number (optional)</label>
          <input type="text" id="cust-gst" placeholder="22ABCDE1234F1Z5" />
        </div>
      </div>
      <div class="form-row c1">
        <div class="field-group" style="margin-bottom: 0;">
          <label>Address</label>
          <textarea id="cust-addr" placeholder="Street, City, State"></textarea>
        </div>
      </div>

      <button class="btn-save" onclick="saveCustomer()">Save Customer</button>
    </div>

    <div class="section-title">Saved Customers</div>
    <div class="card">
      <div id="cust-list-wrap"></div>
    </div>

  </div>

  <!-- HOME INDICATOR -->
  <div class="home-indicator"><span></span></div>

  <script>
    var customers = JSON.parse(localStorage.getItem('udhyog_customers') || '[]');

    window.onload = function () {
      renderList();
    };

    function saveCustomer() {
      var name = document.getElementById('cust-name').value.trim();
      var phone = document.getElementById('cust-phone').value.trim();
      var addr = document.getElementById('cust-addr').value.trim();
      var gst = document.getElementById('cust-gst').value.trim();

      if (!name) { showMsg('Please enter Full Name!', 'error'); return; }
      if (!phone) { showMsg('Please enter Phone Number!', 'error'); return; }
      if (!addr) { showMsg('Please enter Address!', 'error'); return; }

      var customer = {
        id: Date.now(),
        name: name,
        phone: phone,
        addr: addr,
        gst: gst || '—',
        at: new Date().toLocaleString()
      };

      customers.unshift(customer);
      try {
        localStorage.setItem('udhyog_customers', JSON.stringify(customers));
        clearForm();
        renderList();
        showMsg('Customer "' + name + '" saved successfully! \u2714', 'success');
      } catch (e) {
        customers.shift();
        showMsg('Storage Error: Unable to save customer.', 'error');
      }
    }

    function deleteCustomer(id) {
      var original = customers;
      customers = customers.filter(function (c) { return c.id !== id; });
      try {
        localStorage.setItem('udhyog_customers', JSON.stringify(customers));
        renderList();
      } catch (e) {
        customers = original;
        alert('Storage Error: Unable to delete customer.');
      }
    }

    function renderList() {
      var el = document.getElementById('cust-list-wrap');
      if (customers.length === 0) {
        el.innerHTML = '<div class="empty-note">No customers saved yet.</div>';
        return;
      }
      el.innerHTML = customers.map(function (c) {
        return '<div class="cust-card">' +
          '<div>' +
          '<div class="c-name">' + esc(c.name) + '</div>' +
          '<div class="c-phone">&#128222; ' + esc(c.phone) + '</div>' +
          '<div class="c-addr">&#128205; ' + esc(c.addr) + '</div>' +
          (c.gst !== '—' ? '<div class="c-gst">GST: ' + esc(c.gst) + '</div>' : '') +
          '</div>' +
          '<button class="del-btn" onclick="deleteCustomer(' + c.id + ')">&#10005;</button>' +
          '</div>';
      }).join('');
    }

    function clearForm() {
      document.getElementById('cust-name').value = '';
      document.getElementById('cust-phone').value = '';
      document.getElementById('cust-addr').value = '';
      document.getElementById('cust-gst').value = '';
    }

    function showMsg(text, type) {
      var el = document.getElementById('msg-box');
      el.textContent = text;
      el.className = 'msg-box ' + type;
      el.style.display = 'block';
      setTimeout(function () { el.style.display = 'none'; }, 3000);
    }

    function esc(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>

</body>

</html>
