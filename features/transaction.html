<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Transactions - Udhyog Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans', Arial, sans-serif;
      background: #eef2ff;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; height: 58px;
      background: #1a237e; border-bottom: 3px solid #ffeb3b;
    }
    .topbar .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .topbar .logo-icon {
      width: 32px; height: 32px; background: #ffeb3b; color: #1a237e;
      font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 16px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .topbar .logo-text { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 17px; color: #fff; }
    .topbar .logo-text .accent { color: #ffeb3b; }
    .topbar h1 { font-family: 'Baloo 2', cursive; font-size: 16px; font-weight: 700; color: #c5cae9; }

    /* SEARCH BAR */
    .search-wrap {
      padding: 0 18px 18px;
    }
    .search-wrap input {
      width: 100%;
      background: #fff;
      border: 1.5px solid #c5cae9;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #222;
      font-family: 'Noto Sans', Arial, sans-serif;
      outline: none;
      transition: border .2s;
    }
    .search-wrap input::placeholder { color: #999; }
    .search-wrap input:focus { border-color: #1a237e; background: #fff; }

    /* STATS ROW */
    .stats-row {
      display: flex;
      gap: 12px;
      padding: 0 18px 22px;
    }
    .stat-box {
      flex: 1;
      background: #fff;
      border: 1.5px solid #c5cae9;
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      transition: transform .2s;
    }
    .stat-box:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,35,126,.08); }
    .stat-box .stat-num {
      font-family: 'Baloo 2', cursive;
      font-size: 26px;
      font-weight: 800;
      color: #1a237e;
      margin-bottom: 5px;
    }
    .stat-box .stat-num.blue { color: #1a237e; }
    .stat-box .stat-label {
      font-size: 12px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* RECENT LABEL */
    .recent-label {
      font-family: 'Baloo 2', cursive;
      font-size: 16px;
      font-weight: 700;
      color: #1a237e;
      border-left: 4px solid #ffeb3b;
      padding-left: 10px;
      margin: 0 18px 14px;
    }

    /* TRANSACTION LIST */
    .txn-list {
      padding: 0 18px;
      flex: 1;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; color: #777; }

    /* TRANSACTION CARD */
    .txn-card {
      background: #fff;
      border: 1.5px solid #c5cae9;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all .2s;
    }
    .txn-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,35,126,.08); border-color: #7986cb; }
    .txn-card:active { transform: scale(0.98); }

    .txn-left { flex: 1; }
    .txn-left .txn-id {
      font-size: 13px;
      color: #1a237e;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .txn-left .txn-cust {
      font-size: 16px;
      font-weight: bold;
      color: #222;
      margin-bottom: 3px;
    }
    .txn-left .txn-date {
      font-size: 12px;
      color: #999;
    }
    .txn-right { text-align: right; }
    .txn-right .txn-amt {
      font-family: 'Baloo 2', cursive;
      font-size: 17px;
      font-weight: 700;
      color: #1a237e;
      margin-bottom: 5px;
    }
    .txn-right .txn-items {
      font-size: 11px;
      color: #999;
    }

    /* INVOICE DETAIL OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      overflow-y: auto;
      padding: 20px 16px 40px;
    }
    .overlay.show { display: block; }

    .inv-card {
      background: #fff;
      color: #222;
      border-radius: 14px;
      padding: 22px;
      max-width: 500px;
      margin: 0 auto;
      font-size: 13px;
    }
    .inv-head {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #1a237e;
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    .inv-biz  { font-size: 17px; font-weight: bold; color: #1a237e; }
    .inv-lbl  { font-size: 20px; font-weight: bold; color: #1a237e; text-align: right; }
    .inv-meta { font-size: 11px; color: #777; text-align: right; }
    .inv-to   { margin-bottom: 14px; }
    .inv-to h4 { font-size: 10px; text-transform: uppercase; color: #999; margin-bottom: 3px; }
    .inv-to p  { font-size: 14px; font-weight: bold; }
    .inv-tbl   { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .inv-tbl th { background: #1a237e; color: #fff; padding: 7px 8px; text-align: left; font-size: 11px; }
    .inv-tbl td { padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    .inv-tbl tr:nth-child(even) td { background: #f5f7ff; }
    .inv-tots { max-width: 200px; margin-left: auto; border: 1px solid #c5cae9; border-radius: 5px; overflow: hidden; }
    .inv-tot-row { display: flex; justify-content: space-between; padding: 5px 10px; border-bottom: 1px solid #eee; font-size: 12px; }
    .inv-tot-row:last-child { background: #1a237e; color: #fff; font-weight: bold; font-size: 13px; border: none; }
    .inv-footer-txt { margin-top: 12px; text-align: center; font-size: 11px; color: #bbb; border-top: 1px dashed #ddd; padding-top: 10px; }

    .overlay-btns {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn-close-ov {
      flex: 1;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
    }
    .btn-print-ov {
      flex: 1;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Baloo 2', cursive;
    }

    /* HOME INDICATOR */
    .footer {
      background: #0d1142;
      color: #c5cae9;
      text-align: center;
      padding: 16px;
      font-size: 12px;
      margin-top: 30px;
      border-top: 2px solid rgba(255, 235, 59, .15);
    }
    .footer b { color: #ffeb3b; }

    @media print {
      body * { visibility: hidden; }
      .inv-card, .inv-card * { visibility: visible; }
      .inv-card { position: fixed; top: 0; left: 0; width: 100%; border-radius: 0; }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="inv-card" id="inv-detail"></div>
    <div class="overlay-btns">
      <button class="btn-close-ov" onclick="closeOverlay()">&#8592; Close</button>
      <button class="btn-print-ov" onclick="window.print()">&#128424; Print</button>
    </div>
  </div>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="features.html" class="logo">
      <div class="logo-icon">U</div>
      <span class="logo-text">Udhyog <span class="accent">Invoice</span></span>
    </a>
    <h1>All Transactions</h1>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input type="text" id="search-inp" placeholder="&#128269;  Search by customer name..." oninput="filterTxns()" />
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="total-bills">0</div>
      <div class="stat-label">Total Bills</div>
    </div>
    <div class="stat-box">
      <div class="stat-num blue" id="total-amount">&#8377;0</div>
      <div class="stat-label">Total Amount</div>
    </div>
  </div>

  <!-- RECENT LABEL -->
  <div class="recent-label">Recent</div>

  <!-- TRANSACTION LIST -->
  <div class="txn-list" id="txn-list"></div>

  <!-- FOOTER -->
  <div class="footer">&copy; 2026 <b>Udhyog Invoice</b> &mdash; Made with &#10084; for Indian Businesses</div>

<script>
  var invoices = [];
  var filtered = [];

  window.onload = function () {
    invoices = JSON.parse(localStorage.getItem('udhyog_invoices') || '[]');
    filtered  = invoices.slice();
    renderStats();
    renderList();
  };

  /* ---- STATS ---- */
  function renderStats() {
    var total = invoices.reduce(function (s, inv) { return s + (inv.total || 0); }, 0);
    document.getElementById('total-bills').textContent  = invoices.length;
    document.getElementById('total-amount').innerHTML   = '&#8377;' + Number(total).toLocaleString('en-IN', { minimumFractionDigits: 0 });
  }

  /* ---- FILTER ---- */
  function filterTxns() {
    var q = document.getElementById('search-inp').value.trim().toLowerCase();
    filtered = invoices.filter(function (inv) {
      return (inv.customer || '').toLowerCase().includes(q) ||
             (inv.id || '').toLowerCase().includes(q);
    });
    renderList();
  }

  /* ---- RENDER LIST ---- */
  function renderList() {
    var el = document.getElementById('txn-list');

    if (filtered.length === 0) {
      el.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">&#128196;</div>' +
          '<p>No transactions found.</p>' +
          '<p style="margin-top:6px;font-size:12px;color:#333">Generate an invoice first!</p>' +
        '</div>';
      return;
    }

    el.innerHTML = filtered.map(function (inv, i) {
      var itemCount = (inv.items || []).length;
      return '<div class="txn-card" onclick="viewInvoice(' + i + ')">' +
        '<div class="txn-left">' +
          '<div class="txn-id">' + esc(inv.id || 'UI-XXXXX') + '</div>' +
          '<div class="txn-cust">' + esc(inv.customer || 'Customer') + '</div>' +
          '<div class="txn-date">' + (inv.date || inv.at || '—') + '</div>' +
        '</div>' +
        '<div class="txn-right">' +
          '<div class="txn-amt">&#8377;' + Number(inv.total || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 }) + '</div>' +
          '<div class="txn-items">' + itemCount + ' item' + (itemCount !== 1 ? 's' : '') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ---- VIEW INVOICE ---- */
  function viewInvoice(i) {
    var inv = filtered[i];
    if (!inv) return;

    var rows = (inv.items || []).map(function (it, idx) {
      return '<tr>' +
        '<td>' + (idx + 1) + '</td>' +
        '<td>' + esc(it.name || '—') + '</td>' +
        '<td>' + (it.qty || 1) + '</td>' +
        '<td>&#8377;' + Number(it.price || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 }) + '</td>' +
        '<td>&#8377;' + Number(it.total || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 }) + '</td>' +
      '</tr>';
    }).join('');

    var sub   = (inv.items || []).reduce(function (s, it) { return s + (it.total || 0); }, 0);
    var tax   = sub * 0.18;
    var grand = inv.total || (sub + tax);
    var user  = localStorage.getItem('udhyog_user') || 'Business';

    document.getElementById('inv-detail').innerHTML =
      '<div class="inv-head">' +
        '<div>' +
          '<div class="inv-biz">&#127981; ' + esc(user) + '</div>' +
          '<div style="font-size:11px;color:#777;margin-top:2px">Udhyog Invoice</div>' +
        '</div>' +
        '<div>' +
          '<div class="inv-lbl">INVOICE</div>' +
          '<div class="inv-meta">No: ' + esc(inv.id || '—') + '</div>' +
          '<div class="inv-meta">Date: ' + (inv.date || '—') + '</div>' +
        '</div>' +
      '</div>' +

      '<div class="inv-to">' +
        '<h4>Bill To</h4>' +
        '<p>' + esc(inv.customer || 'Customer') + '</p>' +
      '</div>' +

      '<table class="inv-tbl">' +
        '<thead><tr><th>#</th><th>Product</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +

      '<div class="inv-tots">' +
        '<div class="inv-tot-row"><span>Subtotal</span><span>&#8377;' + Number(sub).toLocaleString('en-IN', { minimumFractionDigits: 2 }) + '</span></div>' +
        '<div class="inv-tot-row"><span>GST 18%</span><span>&#8377;' + Number(tax).toLocaleString('en-IN', { minimumFractionDigits: 2 }) + '</span></div>' +
        '<div class="inv-tot-row"><span>Total</span><span>&#8377;' + Number(grand).toLocaleString('en-IN', { minimumFractionDigits: 2 }) + '</span></div>' +
      '</div>' +

      (inv.notes ? '<div style="margin-top:12px;font-size:12px;color:#666"><b>Notes:</b> ' + esc(inv.notes) + '</div>' : '') +
      '<div class="inv-footer-txt">Generated by <b>Udhyog Invoice</b> &mdash; Thank you for your business!</div>';

    document.getElementById('overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    document.body.style.overflow = '';
  }

  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>

</body>
</html>
