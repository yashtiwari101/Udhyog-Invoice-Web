<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Udhyog Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Noto+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="login-style.css" />
</head>

<body>

  <!-- Background shapes -->
  <div class="bg-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
  </div>

  <!-- NAV BAR -->
  <nav class="login-nav">
    <a href="../index.html" class="logo">
      <div class="logo-icon">U</div>
      <span class="logo-text">Udhyog <span class="accent">Invoice</span></span>
    </a>
    <a href="../index.html" class="back-link">← Back to Home</a>
  </nav>

  <!-- LOGIN CARD -->
  <div class="main-wrap">
    <div class="login-box">

      <div class="login-header">
        <div class="login-avatar">🔐</div>
        <h2 class="form-heading">Welcome Back!</h2>
        <p class="sub-text">Login to access your Udhyog Invoice dashboard.</p>
      </div>

      <div id="msg-box" class="msg-box" style="display:none;"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="example@gmail.com" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="Enter your password" />
          <span class="show-pass" onclick="togglePass('password', this)">Show</span>
        </div>
      </div>

      <div class="forgot-row">
        <a href="#">Forgot Password?</a>
      </div>

      <button class="btn-login" onclick="doLogin()">Login →</button>

      <div class="divider"><span>OR</span></div>

      <p class="signup-text">Don't have an account? <a href="signup.html">Sign Up here</a></p>

      <div class="free-badge">🎉 100% Free — No credit card needed</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    &copy; 2026 <b>Udhyog Invoice</b> &mdash; Made with &#10084; for Indian Businesses
  </div>

  <script>
    function togglePass(id, btn) {
      var inp = document.getElementById(id);
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = 'Hide';
      } else {
        inp.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function doLogin() {
      var email = document.getElementById('email').value.trim();
      var pass = document.getElementById('password').value.trim();
      var msg = document.getElementById('msg-box');

      if (!email || !pass) {
        msg.style.display = 'block';
        msg.className = 'msg-box error';
        msg.textContent = 'Please fill in all fields!';
        return;
      }
      if (!email.includes('@')) {
        msg.style.display = 'block';
        msg.className = 'msg-box error';
        msg.textContent = 'Please enter a valid email address!';
        return;
      }
      if (pass.length < 6) {
        msg.style.display = 'block';
        msg.className = 'msg-box error';
        msg.textContent = 'Password must be at least 6 characters!';
        return;
      }

      try {
        localStorage.setItem('udhyog_user', email);
        msg.style.display = 'block';
        msg.className = 'msg-box success';
        msg.textContent = 'Login successful! Redirecting...';

        setTimeout(function () {
          window.location.href = '../features/features.html';
        }, 1500);
      } catch (e) {
        msg.style.display = 'block';
        msg.className = 'msg-box error';
        msg.textContent = 'Storage Error: Unable to save login info.';
      }
    }
  </script>

</body>

</html>
